# Shared security headers.
#
# nginx's add_header does NOT merge across config levels: the moment a location
# declares any add_header of its own, it drops every add_header inherited from
# the server block. So this snippet is included at the server level AND re-included
# in each location that sets its own headers (e.g. Cache-Control), guaranteeing
# every response carries the full set.
add_header X-Content-Type-Options   "nosniff"                                   always;
add_header X-Frame-Options          "DENY"                                      always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"           always;
add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()"  always;

# Behind TLS-terminating Traefik: the browser receives this over HTTPS, so it is
# honoured even though nginx itself speaks plain HTTP to the proxy.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"      always;

# Fully strict CSP: no inline styles/scripts anywhere (the landing cards'
# per-card --accent custom properties live in landing.css modifier classes).
# connect-src additionally allows the two first-party relay directories so the
# room join page (room.html) can resolve a code to its game; harmless surplus
# on the other pages.
# No upgrade-insecure-requests: all asset URLs are relative (nothing to
# upgrade in production), and it breaks plain-HTTP LAN testing by forcing
# subresources to https://<ip>, which nothing serves.
add_header Content-Security-Policy   "default-src 'self'; img-src 'self'; style-src 'self'; script-src 'self'; font-src 'self'; connect-src 'self' https://ws.couch-games.com https://ws.hexstacker.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;

# No cross-origin popups/openers needed anywhere on the site.
add_header Cross-Origin-Opener-Policy "same-origin" always;
