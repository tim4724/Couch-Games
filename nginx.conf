# Static file serving for couch-games.com.
# Runs under the unprivileged nginx image, so it listens on 8080 (non-root).
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Behind TLS-terminating Traefik: keep redirect Location headers relative so
    # nginx doesn't leak its internal http scheme / :8080 port into them.
    absolute_redirect off;

    # Don't advertise the nginx version in the Server header / error pages.
    server_tokens off;

    # Compress text responses. text/html is always compressed by default; the
    # rest of the site payload (CSS/JS/SVG/feeds) is listed explicitly.
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types        text/css application/javascript application/json
                      image/svg+xml application/xml application/rss+xml text/plain
                      image/x-icon;

    # Security headers, applied to every response (see snippet for the add_header
    # inheritance caveat that requires re-including it per location below).
    include /etc/nginx/snippets/security-headers.conf;

    # Apple Universal Links: lets an iOS Camera scan of couch-games.com/<room>
    # (and the privacy/imprint pages) open the installed Couch Games app instead
    # of Safari. Apple's CDN fetches this over HTTPS as application/json with no
    # redirect. It's a dotfile path, so it must be carved out ahead of the
    # blanket dotfile 404 below — an exact-match location outranks that regex, so
    # order doesn't matter, but it's kept adjacent for clarity.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Android App Links: the Digital Asset Links statement lets a system QR scan /
    # tapped couch-games.com/<room> (and the privacy/imprint pages) open the app
    # instead of Chrome. Same dotfile-carve-out reasoning as the AASA above.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Room join links (couch-games.com/<CODE>#<instance>): the browser fallback
    # for the app deep links above — when the app isn't installed, room.html
    # looks the code up on the relay and offers browser play + the stores.
    # Codes are exactly 6 base58 chars (no 0OIl), so /health, /privacy etc.
    # can never collide. Same no-cache policy as the other HTML.
    location ~ "^/[1-9A-HJ-NP-Za-km-z]{6}$" {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /room.html =404;
    }

    # Never serve dotfiles/dotdirs (defense in depth on top of .dockerignore —
    # a stray .git/.github/.env in the image must not become public). ACME is
    # terminated by Traefik/cert-manager, so no other /.well-known path is needed.
    location ~ /\. {
        return 404;
    }

    # Liveness/readiness endpoint for the k8s probes.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # CSS/JS are cache-busted via ?v=N query strings, so they can be cached hard.
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Icons / images / feeds are not content-versioned — keep a modest TTL.
    location ~* \.(?:ico|svg|png|xml|txt|webp)$ {
        add_header Cache-Control "public, max-age=86400" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Anything else under /assets/.
    location /assets/ {
        add_header Cache-Control "public, max-age=604800" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Canonicalize the legacy .html URLs onto the extensionless form.
    location = /privacy.html { return 301 /privacy; }
    location = /imprint.html { return 301 /imprint; }
    location = /en/privacy.html { return 301 /en/privacy; }
    location = /en/imprint.html { return 301 /en/imprint; }

    # room.html is only ever served via the room-code location above; a direct
    # hit has no code in the path for the script to look up, so send it home.
    # (try_files' internal use above doesn't re-run location matching.)
    location = /room.html { return 301 /; }

    # Real pages only (index/privacy/imprint) — unknown paths 404, no SPA fallback.
    # $uri.html lets extensionless URLs (/privacy, /imprint) resolve to the .html file.
    # HTML must revalidate on every load (no-cache still allows storing + ETag
    # revalidation) so a deploy is picked up immediately; the assets it points
    # at are ?v=-versioned and long-cached instead.
    location / {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri.html $uri/ =404;
    }
}
